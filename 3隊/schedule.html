<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三隊進度排程系統</title>
    <!-- Google Fonts Inter & Noto Sans TC -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'Noto Sans TC', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- SheetJS (XLSX) CDN for Excel Import/Export -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

    <!-- Application Script Block (Moved to HEAD before AlpineJS to guarantee execution order) -->
    <script>
        // Date helpers for Monday/Sunday alignment of weekly columns
        function getMonday(d) {
            d = new Date(d);
            var day = d.getDay(),
                diff = d.getDate() - day + (day == 0 ? -6 : 1);
            return new Date(d.setDate(diff));
        }

        function getSunday(d) {
            d = new Date(d);
            var day = d.getDay(),
                diff = d.getDate() + (day == 0 ? 0 : 7 - day);
            return new Date(d.setDate(diff));
        }

        function projectApp() {
            return {
                darkMode: false,
                tasks: [],
                milestones: [],
                teams: {
                    director: { name: '編導組 (Director)', color: 'violet', badgeColor: 'bg-violet-500', bgClass: 'bg-violet-50/50 dark:bg-violet-950/20', borderClass: 'border-violet-200 dark:border-violet-800' },
                    server: { name: 'Server組 (Backend)', color: 'indigo', badgeColor: 'bg-indigo-500', bgClass: 'bg-indigo-50/50 dark:bg-indigo-950/20', borderClass: 'border-indigo-200 dark:border-indigo-800' },
                    client: { name: 'Client組 (Frontend)', color: 'emerald', badgeColor: 'bg-emerald-500', bgClass: 'bg-emerald-50/50 dark:bg-emerald-950/20', borderClass: 'border-emerald-200 dark:border-emerald-800' },
                    probability: { name: '機率組 (Math/Prob)', color: 'amber', badgeColor: 'bg-amber-500', bgClass: 'bg-amber-50/50 dark:bg-amber-950/20', borderClass: 'border-amber-200 dark:border-amber-800' }
                },
                projectStart: new Date(),
                projectEnd: new Date(),
                
                // Filtering state
                searchQuery: '',
                filterTeam: 'all',
                filterStatus: 'all',

                // Modal state
                showTaskModal: false,
                modalTitle: '新增任務',
                currentTask: { id: null, name: '', team: 'director', assignee: '', startDate: '', endDate: '', progress: 0, status: 'Not Started', notes: '' },

                showMilestoneModal: false,
                currentMilestone: { id: null, name: '', date: '' },

                // Custom Confirm state
                confirmModal: { show: false, title: '', message: '', onConfirm: () => {} },

                // Alert notification
                toast: { show: false, message: '', type: 'success' },

                // Initialize App
                initApp() {
                    // Dark mode preference sync
                    if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                        this.darkMode = true;
                    }

                    // Load from local storage or set defaults
                    const storedTasks = localStorage.getItem('team3_schedule_tasks');
                    const storedMilestones = localStorage.getItem('team3_schedule_milestones');

                    if (storedTasks && storedMilestones) {
                        this.tasks = JSON.parse(storedTasks);
                        this.milestones = JSON.parse(storedMilestones);
                    } else {
                        this.loadDemoData();
                    }

                    this.updateProjectRange();
                    
                    // Fire Lucide icons translation
                    this.$nextTick(() => { 
                        if (window.lucide) {
                            lucide.createIcons(); 
                        }
                    });
                },

                // Reset back to initial mockup data custom tailored for Director, Server, Client, Probability
                loadDemoData() {
                    this.tasks = [
                        // Director (編導)
                        { id: 1, name: '主遊戲核心玩法與腳本企劃案定稿', team: 'director', assignee: '編導小明', startDate: '2026-06-01', endDate: '2026-06-08', progress: 100, status: 'Completed', notes: '主題、故事線、演出氛圍及特效規格書已定案。' },
                        { id: 2, name: '主UI視覺稿及骨骼動畫動態分鏡審查', team: 'director', assignee: '編導小明', startDate: '2026-06-07', endDate: '2026-06-18', progress: 80, status: 'In Progress', notes: '與美術完成第一波 UI 互動調教討論。' },
                        { id: 3, name: '大賞（Grand Win）華麗特效分鏡與音效規格書', team: 'director', assignee: '編導小華', startDate: '2026-06-16', endDate: '2026-06-28', progress: 20, status: 'In Progress', notes: '提供聲效規格與視覺粒子強度規劃。' },

                        // Server
                        { id: 4, name: '核心遊戲邏輯架構與 API 接口設計', team: 'server', assignee: 'Server志明', startDate: '2026-06-05', endDate: '2026-06-19', progress: 100, status: 'Completed', notes: '防作弊機制與核心 WebSocket 協議文件已發布。' },
                        { id: 5, name: '機率模型對接開發與百萬次數值跑分', team: 'server', assignee: 'Server小美', startDate: '2026-06-16', endDate: '2026-07-02', progress: 60, status: 'In Progress', notes: '承接機率組之數學模型，於後端進行大數據壓測跑分。' },
                        { id: 6, name: '玩家狀態持久化與高併發連線載入優化', team: 'server', assignee: 'Server志明', startDate: '2026-06-28', endDate: '2026-07-15', progress: 0, status: 'Not Started', notes: '預備在核心邏輯穩健後實施 Cache 層部署。' },

                        // Client
                        { id: 7, name: '主場景 UI 響應式切圖與版面組裝', team: 'client', assignee: 'Client春嬌', startDate: '2026-06-05', endDate: '2026-06-16', progress: 100, status: 'Completed', notes: '全解析度、骨骼動畫與預載入管理器配置完畢。' },
                        { id: 8, name: '動態輪盤滾動物理模擬與特效對接', team: 'client', assignee: 'Client小傑', startDate: '2026-06-15', endDate: '2026-06-29', progress: 75, status: 'In Progress', notes: '完成漸進式速度曲線調校與快顯視窗串接。' },
                        { id: 9, name: '後端 WebSocket 通訊封包模組與狀態機整合', team: 'client', assignee: 'Client春嬌', startDate: '2026-06-24', endDate: '2026-07-12', progress: 15, status: 'In Progress', notes: '正在等 Server 完成第二階段測試鏈對接。' },

                        // Probability (機率)
                        { id: 10, name: '核心數學機率模型設計與首版 RTP 試算', team: 'probability', assignee: '機率阿里', startDate: '2026-06-01', endDate: '2026-06-12', progress: 100, status: 'Completed', notes: '基礎 RTP 設定為 96.5%，基本賠付表建立。' },
                        { id: 11, name: '波動度（Volatility）分析與 Free Game 機率計算', team: 'probability', assignee: '機率阿里', startDate: '2026-06-12', endDate: '2026-06-26', progress: 80, status: 'In Progress', notes: '針對紅利遊戲高倍率頻率進行微調。' },
                        { id: 12, name: '大數據千萬次模擬運行、驗收與波動表產出', team: 'probability', assignee: '機率婷婷', startDate: '2026-06-22', endDate: '2026-07-08', progress: 10, status: 'In Progress', notes: '生成數學驗收標準白皮書，預備提交 GLI 檢驗。' }
                    ];

                    this.milestones = [
                        { id: 1, name: '腳本與基本機率模型定案', date: '2026-06-08' },
                        { id: 2, name: '滾動對接與百萬次模擬完成', date: '2026-06-26' },
                        { id: 3, name: '前後端完全對接暨大壓測完成', date: '2026-07-12' }
                    ];
                },

                // Handle theme toggle
                toggleDarkMode() {
                    this.darkMode = !this.darkMode;
                    localStorage.setItem('theme', this.darkMode ? 'dark' : 'light');
                },

                // Dynamic project range helper (Align with Monday and Sunday padding)
                updateProjectRange() {
                    if (this.tasks.length === 0) {
                        this.projectStart = getMonday(new Date());
                        this.projectEnd = getSunday(new Date(this.projectStart.getTime() + 55 * 24 * 60 * 60 * 1000));
                        return;
                    }

                    let min = new Date(this.tasks[0].startDate);
                    let max = new Date(this.tasks[0].endDate);

                    this.tasks.forEach(t => {
                        let s = new Date(t.startDate);
                        let e = new Date(t.endDate);
                        if (s < min) min = s;
                        if (e > max) max = e;
                    });

                    // Pad nicely
                    this.projectStart = getMonday(min);
                    this.projectEnd = getSunday(max);

                    // Min 4 weeks pad
                    let diffDays = Math.ceil((this.projectEnd - this.projectStart) / (24 * 60 * 60 * 1000));
                    if (diffDays < 28) {
                        this.projectEnd = new Date(this.projectStart.getTime() + 27 * 24 * 60 * 60 * 1000);
                    }
                },

                // Save data helper
                saveDataLocally() {
                    localStorage.setItem('team3_schedule_tasks', JSON.stringify(this.tasks));
                    localStorage.setItem('team3_schedule_milestones', JSON.stringify(this.milestones));
                    this.updateProjectRange();
                    this.$nextTick(() => { 
                        if(window.lucide) lucide.createIcons(); 
                    });
                },

                // Custom Confirm Dialog Trigger
                triggerConfirm(title, message, onConfirmCallback) {
                    this.confirmModal.title = title;
                    this.confirmModal.message = message;
                    this.confirmModal.onConfirm = onConfirmCallback;
                    this.confirmModal.show = true;
                    this.$nextTick(() => { 
                        if(window.lucide) lucide.createIcons(); 
                    });
                },

                // Trigger Reset with Custom Confirm Modal
                confirmReset() {
                    this.triggerConfirm(
                        '還原預設範例', 
                        '您確定要還原成三隊的預設排程數據嗎？這將會覆蓋您目前在瀏覽器中所有的修改與進度。', 
                        () => {
                            this.loadDemoData();
                            this.saveDataLocally();
                            this.showToast('已恢復三隊專案預設排程！', 'success');
                        }
                    );
                },

                // --- EXCEL EXPORT ---
                exportToExcel() {
                    try {
                        if (typeof XLSX === 'undefined') {
                            this.showToast('Excel 工具庫尚未載入完成，請稍後再試！', 'error');
                            return;
                        }

                        // Ensure we have data
                        if (!this.tasks || !Array.isArray(this.tasks)) {
                            this.showToast('沒有可匯出的任務資料！', 'error');
                            return;
                        }

                        // 1. Map Tasks to Friendly Chinese Headers for Excel Editing
                        const tasksForExcel = this.tasks.map(t => ({
                            '任務ID': t.id,
                            '任務名稱': t.name || '',
                            '執行組別': this.getTeamChineseName(t.team),
                            '負責人': t.assignee || '',
                            '開始日期': t.startDate || '',
                            '結束日期': t.endDate || '',
                            '完成進度(%)': t.progress || 0,
                            '任務狀態': this.getStatusLabel(t.status),
                            '備註說明': t.notes || ''
                        }));

                        // 2. Map Milestones to Friendly Chinese Headers
                        const milestonesForExcel = (this.milestones || []).map(m => ({
                            '里程碑ID': m.id,
                            '里程碑名稱': m.name || '',
                            '達成日期': m.date || ''
                        }));

                        // 3. Create Workbook and add Sheets
                        const wb = XLSX.utils.book_new();
                        
                        const wsTasks = XLSX.utils.json_to_sheet(tasksForExcel);
                        
                        // Set Column widths
                        wsTasks['!cols'] = [
                            { wch: 15 }, // ID
                            { wch: 40 }, // Name
                            { wch: 20 }, // Team
                            { wch: 15 }, // Assignee
                            { wch: 15 }, // Start
                            { wch: 15 }, // End
                            { wch: 15 }, // Progress
                            { wch: 15 }, // Status
                            { wch: 40 }  // Notes
                        ];
                        
                        XLSX.utils.book_append_sheet(wb, wsTasks, '任務列表');

                        // Only add Milestone sheet if there is data
                        if (milestonesForExcel.length > 0) {
                            const wsMilestones = XLSX.utils.json_to_sheet(milestonesForExcel);
                            wsMilestones['!cols'] = [
                                { wch: 15 }, // ID
                                { wch: 30 }, // Name
                                { wch: 15 }  // Date
                            ];
                            XLSX.utils.book_append_sheet(wb, wsMilestones, '專案里程碑');
                        }

                        // Generate file name with current date
                        const dateStr = new Date().toISOString().slice(0, 10).replace(/-/g, '');
                        const fileName = `三隊進度排程資料_${dateStr}.xlsx`;

                        // Write and download the file
                        XLSX.writeFile(wb, fileName);
                        
                        this.showToast('Excel 檔案匯出成功！', 'success');
                    } catch (err) {
                        console.error("Excel Export Error: ", err);
                        this.showToast('匯出 Excel 失敗，請重試！', 'error');
                    }
                },

                // --- EXCEL IMPORT ---
                importFromExcel(event) {
                    const file = event.target.files[0];
                    if (!file) return;

                    if (typeof XLSX === 'undefined') {
                        this.showToast('Excel 工具庫尚未載入完成，請稍後再試！', 'error');
                        return;
                    }

                    const reader = new FileReader();
                    reader.onload = (e) => {
                        try {
                            const data = new Uint8Array(e.target.result);
                            const wb = XLSX.read(data, { type: 'array', cellDates: true, cellNF: false, cellText: false });
                            
                            let importedTasks = [];
                            let importedMilestones = [];

                            if (wb.SheetNames.includes('任務列表')) {
                                const wsTasks = wb.Sheets['任務列表'];
                                const rawTasks = XLSX.utils.sheet_to_json(wsTasks);
                                
                                importedTasks = rawTasks.map((row, index) => {
                                    const rawTeam = row['執行組別'] || '';
                                    const parsedTeam = this.mapChineseTeamToId(rawTeam);
                                    
                                    const rawStatus = row['任務狀態'] || '';
                                    const parsedStatus = this.mapChineseStatusToId(rawStatus);

                                    const progressVal = parseInt(row['完成進度(%)'] !== undefined ? row['完成進度(%)'] : row['完成進度'] || 0);

                                    return {
                                        id: row['任務ID'] ? parseInt(row['任務ID']) : (Date.now() + index),
                                        name: row['任務名稱'] || '未命名任務',
                                        team: parsedTeam,
                                        assignee: row['負責人'] || '未指定',
                                        startDate: this.excelDateToString(row['開始日期']),
                                        endDate: this.excelDateToString(row['結束日期']),
                                        progress: isNaN(progressVal) ? 0 : Math.min(100, Math.max(0, progressVal)),
                                        status: parsedStatus,
                                        notes: row['備註說明'] || ''
                                    };
                                });
                            }

                            if (wb.SheetNames.includes('專案里程碑')) {
                                const wsMilestones = wb.Sheets['專案里程碑'];
                                const rawMilestones = XLSX.utils.sheet_to_json(wsMilestones);

                                importedMilestones = rawMilestones.map((row, index) => {
                                    return {
                                        id: row['里程碑ID'] ? parseInt(row['里程碑ID']) : (Date.now() + 1000 + index),
                                        name: row['里程碑名稱'] || '未命名里程碑',
                                        date: this.excelDateToString(row['達成日期'])
                                    };
                                });
                            }

                            if (importedTasks.length === 0 && importedMilestones.length === 0) {
                                this.showToast('匯入失敗：未在 Excel 檔案中找到任何有效數據！', 'error');
                                return;
                            }

                            if (importedTasks.length > 0) this.tasks = importedTasks;
                            if (importedMilestones.length > 0) this.milestones = importedMilestones;

                            this.saveDataLocally();
                            this.showToast('Excel 資料成功匯入並更新！', 'success');

                        } catch (err) {
                            console.error(err);
                            this.showToast('匯入失敗：不支援的試算表格式或檔案已損毀！', 'error');
                        }
                    };
                    reader.readAsArrayBuffer(file);
                    event.target.value = '';
                },

                excelDateToString(val) {
                    if (!val) return this.formatDateFull(new Date());
                    
                    if (val instanceof Date) {
                        const tzOffset = val.getTimezoneOffset() * 60000; 
                        const adjustedDate = new Date(val.getTime() - tzOffset);
                        return adjustedDate.toISOString().split('T')[0];
                    }
                    
                    if (typeof val === 'number') {
                        const date = new Date((val - 25569) * 86400 * 1000);
                        return date.toISOString().split('T')[0];
                    }
                    
                    if (typeof val === 'string') {
                        const trimmed = val.trim();
                        const d = new Date(trimmed);
                        if (!isNaN(d.getTime())) {
                            return d.toISOString().split('T')[0];
                        }
                        return trimmed;
                    }
                    
                    return this.formatDateFull(new Date());
                },

                getTeamChineseName(teamId) {
                    const names = {
                        director: '編導組 (Director)',
                        server: 'Server組 (Backend)',
                        client: 'Client組 (Frontend)',
                        probability: '機率組 (Math/Prob)'
                    };
                    return names[teamId] || '編導組 (Director)';
                },

                mapChineseTeamToId(val) {
                    if (!val) return 'director';
                    const s = val.toString().toLowerCase().trim();
                    if (s.includes('director') || s.includes('編導') || s.includes('編')) return 'director';
                    if (s.includes('server') || s.includes('backend') || s.includes('後端') || s.includes('后端')) return 'server';
                    if (s.includes('client') || s.includes('frontend') || s.includes('前端') || s.includes('客')) return 'client';
                    if (s.includes('probability') || s.includes('math') || s.includes('prob') || s.includes('機率') || s.includes('数') || s.includes('數')) return 'probability';
                    return 'director';
                },

                mapChineseStatusToId(val) {
                    if (!val) return 'Not Started';
                    const s = val.toString().toLowerCase().trim();
                    if (s.includes('not started') || s.includes('未') || s.includes('等')) return 'Not Started';
                    if (s.includes('in progress') || s.includes('進') || s.includes('做')) return 'In Progress';
                    if (s.includes('completed') || s.includes('已完成') || s.includes('完') || s.includes('定')) return 'Completed';
                    if (s.includes('delayed') || s.includes('延') || s.includes('卡')) return 'Delayed';
                    return 'Not Started';
                },

                showToast(msg, type = 'success') {
                    this.toast.message = msg;
                    this.toast.type = type;
                    this.toast.show = true;
                    this.$nextTick(() => { 
                        if(window.lucide) lucide.createIcons(); 
                    });
                    setTimeout(() => { this.toast.show = false; }, 3000);
                },

                getWeeks() {
                    let weeks = [];
                    let current = new Date(this.projectStart);
                    while (current <= this.projectEnd) {
                        weeks.push({
                            label: `W${weeks.length + 1}`,
                            dateStr: `${current.getMonth() + 1}/${current.getDate()}`
                        });
                        current.setDate(current.getDate() + 7);
                    }
                    return weeks;
                },

                get filteredTasks() {
                    return this.tasks.filter(task => {
                        const matchesSearch = task.name.toLowerCase().includes(this.searchQuery.toLowerCase()) || 
                                              task.assignee.toLowerCase().includes(this.searchQuery.toLowerCase());
                        const matchesTeam = this.filterTeam === 'all' || task.team === this.filterTeam;
                        const matchesStatus = this.filterStatus === 'all' || task.status === this.filterStatus;
                        return matchesSearch && matchesTeam && matchesStatus;
                    }).sort((a, b) => new Date(a.startDate) - new Date(b.startDate));
                },

                getTasksOfTeam(teamId) {
                    return this.tasks.filter(task => {
                        const matchesSearch = task.name.toLowerCase().includes(this.searchQuery.toLowerCase()) || 
                                              task.assignee.toLowerCase().includes(this.searchQuery.toLowerCase());
                        const matchesStatus = this.filterStatus === 'all' || task.status === this.filterStatus;
                        return task.team === teamId && matchesSearch && matchesStatus;
                    }).sort((a, b) => new Date(a.startDate) - new Date(b.startDate));
                },

                getTasksCountForTeam(teamId) {
                    return this.tasks.filter(t => t.team === teamId).length;
                },

                calculateTotalProgress() {
                    if (this.tasks.length === 0) return 0;
                    const sum = this.tasks.reduce((acc, t) => acc + parseInt(t.progress), 0);
                    return Math.round(sum / this.tasks.length);
                },

                getCompletedRatio() {
                    const completed = this.tasks.filter(t => t.status === 'Completed').length;
                    return `${completed} / ${this.tasks.length}`;
                },

                getCompletedPercentage() {
                    if (this.tasks.length === 0) return 0;
                    const completed = this.tasks.filter(t => t.status === 'Completed').length;
                    return Math.round((completed / this.tasks.length) * 100);
                },

                getDelayedCount() {
                    return this.tasks.filter(t => t.status === 'Delayed').length;
                },

                getRemainingDays() {
                    const today = new Date();
                    const end = new Date(this.projectEnd);
                    if (today > end) return 0;
                    const diffMs = end - today;
                    return Math.ceil(diffMs / (1000 * 60 * 60 * 24));
                },

                isTodayInProjectRange() {
                    const today = new Date();
                    return today >= this.projectStart && today <= this.projectEnd;
                },

                getTodayPercentOffset() {
                    const today = new Date();
                    const totalMs = this.projectEnd.getTime() - this.projectStart.getTime();
                    const todayMs = today.getTime() - this.projectStart.getTime();
                    return ((todayMs / totalMs) * 100).toFixed(2);
                },

                isDateInProjectRange(dateStr) {
                    const d = new Date(dateStr);
                    return d >= this.projectStart && d <= this.projectEnd;
                },

                getDatePercentOffset(dateStr) {
                    const d = new Date(dateStr);
                    const totalMs = this.projectEnd.getTime() - this.projectStart.getTime();
                    const offsetMs = d.getTime() - this.projectStart.getTime();
                    return ((offsetMs / totalMs) * 100).toFixed(2);
                },

                getGanttBarStyle(task) {
                    const start = new Date(task.startDate);
                    const end = new Date(task.endDate);
                    const pStart = this.projectStart;
                    const pEnd = this.projectEnd;

                    const totalMs = pEnd.getTime() - pStart.getTime();
                    let leftMs = start.getTime() - pStart.getTime();
                    let durationMs = end.getTime() - start.getTime() + (24 * 60 * 60 * 1000);

                    if (leftMs < 0) {
                        durationMs += leftMs;
                        leftMs = 0;
                    }
                    if (leftMs + durationMs > totalMs) {
                        durationMs = totalMs - leftMs;
                    }

                    const leftPercent = (leftMs / totalMs) * 100;
                    const widthPercent = (durationMs / totalMs) * 100;

                    return `left: ${leftPercent}%; width: ${widthPercent}%;`;
                },

                getGanttBarTheme(teamId) {
                    const themes = {
                        director: 'bg-violet-50 dark:bg-violet-950/40 border-violet-200 dark:border-violet-800 text-violet-700 dark:text-violet-300',
                        server: 'bg-indigo-50 dark:bg-indigo-950/40 border-indigo-200 dark:border-indigo-800 text-indigo-700 dark:text-indigo-300',
                        client: 'bg-emerald-50 dark:bg-emerald-950/40 border-emerald-200 dark:border-emerald-800 text-emerald-700 dark:text-emerald-300',
                        probability: 'bg-amber-50 dark:bg-amber-950/40 border-amber-200 dark:border-amber-800 text-amber-700 dark:text-amber-300'
                    };
                    return themes[teamId] || themes.director;
                },

                getStatusBadgeClass(status) {
                    const classes = {
                        'Not Started': 'bg-slate-100 text-slate-700 dark:bg-slate-800 dark:text-slate-300',
                        'In Progress': 'bg-blue-100 text-blue-700 dark:bg-blue-950/50 dark:text-blue-300',
                        'Completed': 'bg-emerald-100 text-emerald-700 dark:bg-emerald-950/50 dark:text-emerald-300',
                        'Delayed': 'bg-rose-100 text-rose-700 dark:bg-rose-950/50 dark:text-rose-300'
                    };
                    return classes[status] || classes['Not Started'];
                },

                getStatusLabel(status) {
                    const labels = {
                        'Not Started': '未開始',
                        'In Progress': '進行中',
                        'Completed': '已完成',
                        'Delayed': '已延誤'
                    };
                    return labels[status] || '未開始';
                },

                getTeamAverageProgress(teamId) {
                    const teamTasks = this.tasks.filter(t => t.team === teamId);
                    if (teamTasks.length === 0) return 0;
                    const sum = teamTasks.reduce((acc, t) => acc + parseInt(t.progress), 0);
                    return Math.round(sum / teamTasks.length);
                },

                getTeamTotalDays(teamId) {
                    const teamTasks = this.tasks.filter(t => t.team === teamId);
                    return teamTasks.reduce((acc, t) => acc + this.getDaysBetween(t.startDate, t.endDate), 0);
                },

                getDaysBetween(start, end) {
                    const s = new Date(start);
                    const e = new Date(end);
                    const diff = e - s;
                    return Math.ceil(diff / (1000 * 60 * 60 * 24)) + 1;
                },

                formatDateShort(d) {
                    const date = new Date(d);
                    return `${date.getMonth() + 1}/${date.getDate()}`;
                },

                formatDateFull(d) {
                    const date = new Date(d);
                    return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
                },

                openTaskModal(task = null) {
                    if (task) {
                        this.currentTask = JSON.parse(JSON.stringify(task));
                        this.modalTitle = '編輯排程任務';
                    } else {
                        const today = new Date();
                        const nextWeek = new Date(today.getTime() + 7 * 24 * 60 * 60 * 1000);
                        this.currentTask = {
                            id: null,
                            name: '',
                            team: this.filterTeam !== 'all' ? this.filterTeam : 'director',
                            assignee: '',
                            startDate: this.formatDateFull(today),
                            endDate: this.formatDateFull(nextWeek),
                            progress: 0,
                            status: 'Not Started',
                            notes: ''
                        };
                        this.modalTitle = '新增排程任務';
                    }
                    this.showTaskModal = true;
                    this.$nextTick(() => { 
                        if(window.lucide) lucide.createIcons(); 
                    });
                },

                openTaskModalForTeam(teamId) {
                    this.openTaskModal();
                    this.currentTask.team = teamId;
                },

                saveTask() {
                    const start = new Date(this.currentTask.startDate);
                    const end = new Date(this.currentTask.endDate);
                    
                    if (start > end) {
                        this.showToast('錯誤：開始日期不能晚於結束日期！', 'error');
                        return;
                    }

                    if (parseInt(this.currentTask.progress) === 100) {
                        this.currentTask.status = 'Completed';
                    } else if (parseInt(this.currentTask.progress) > 0 && this.currentTask.status === 'Not Started') {
                        this.currentTask.status = 'In Progress';
                    } else if (parseInt(this.currentTask.progress) === 0 && this.currentTask.status === 'Completed') {
                        this.currentTask.progress = 100;
                    }

                    if (this.currentTask.id) {
                        const index = this.tasks.findIndex(t => t.id === this.currentTask.id);
                        if (index !== -1) {
                            this.tasks[index] = JSON.parse(JSON.stringify(this.currentTask));
                        }
                        this.showToast('排程修改成功！', 'success');
                    } else {
                        this.currentTask.id = Date.now();
                        this.tasks.push(JSON.parse(JSON.stringify(this.currentTask)));
                        this.showToast('排程任務建立成功！', 'success');
                    }

                    this.showTaskModal = false;
                    this.saveDataLocally();
                },

                confirmDeleteTask(id) {
                    const taskToDelete = this.tasks.find(t => t.id === id);
                    const taskName = taskToDelete ? `「${taskToDelete.name}」` : '此任務';
                    this.triggerConfirm(
                        '刪除排程任務', 
                        `您確定要刪除 ${taskName} 嗎？此刪除動作在本地儲存中不可逆。`, 
                        () => {
                            this.tasks = this.tasks.filter(t => t.id !== id);
                            this.saveDataLocally();
                            this.showToast('任務已成功刪除！', 'success');
                        }
                    );
                },

                openMilestoneModal() {
                    const today = new Date();
                    this.currentMilestone = { id: null, name: '', date: this.formatDateFull(today) };
                    this.showMilestoneModal = true;
                    this.$nextTick(() => { 
                        if(window.lucide) lucide.createIcons(); 
                    });
                },

                saveMilestone() {
                    this.currentMilestone.id = Date.now();
                    this.milestones.push(JSON.parse(JSON.stringify(this.currentMilestone)));
                    this.showMilestoneModal = false;
                    this.saveDataLocally();
                    this.showToast('新增專案里程碑成功！', 'success');
                },

                confirmDeleteMilestone(id) {
                    const msToDelete = this.milestones.find(m => m.id === id);
                    const msName = msToDelete ? `「${msToDelete.name}」` : '此里程碑';
                    this.triggerConfirm(
                        '刪除里程碑', 
                        `確定要刪除 ${msName} 里程碑嗎？這將會同步從甘特圖中撤除。`, 
                        () => {
                            this.milestones = this.milestones.filter(m => m.id !== id);
                            this.saveDataLocally();
                            this.showToast('里程碑已成功移除！', 'success');
                        }
                    );
                }
            }
        }
    </script>
    
    <style>
        [x-cloak] { display: none !important; }
    </style>
</head>

                                取消
                            </button>
                            <button type="button" @click="confirmModal.onConfirm(); confirmModal.show = false;" class="px-4 md:px-5 py-1.5 md:py-2 bg-rose-600 hover:bg-rose-700 text-white text-[10px] md:text-xs font-bold rounded-xl transition shadow-md">
                                確認執行
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Toast Alert Notification -->
            <div class="fixed bottom-4 right-4 md:bottom-5 md:right-5 z-[70] transform transition-all duration-300" x-show="toast.show" x-cloak x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 translate-y-4" x-transition:enter-end="opacity-100 translate-y-0" x-transition:leave="transition ease-in duration-200" x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0">
                <div class="px-3 md:px-4 py-2.5 md:py-3 rounded-xl shadow-lg border text-white font-semibold text-xs md:text-sm flex items-center space-x-2"
                     :class="toast.type === 'success' ? 'bg-emerald-600 border-emerald-500' : 'bg-rose-600 border-rose-500'">
                    <i :data-lucide="toast.type === 'success' ? 'check-circle' : 'alert-circle'" class="w-3.5 h-3.5 md:w-4 md:h-4"></i>
                    <span x-text="toast.message"></span>
                </div>
            </div>

            <!-- Footer -->
            <footer class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 md:py-10 mt-8 md:mt-12 border-t border-slate-200 dark:border-slate-800 text-center text-[10px] md:text-xs text-slate-400">
                <p>© 2026 三隊進度排程系統. 專為三隊「編導、Server、Client、機率」多軌協同作業量身打造。支援高度自訂 Excel 二次編輯匯入。</p>
            </footer>

        </div>
    </div>
    
    <!-- ==========================================
         ALPINE JS SCRIPT INITIALIZATION
    =========================================== -->
    <script>
        document.addEventListener('alpine:initialized', () => {
             if(window.lucide) { lucide.createIcons(); }
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

</body>
</html>
