    <!-- Application Script Block (Guaranteed Global Scope Execution) -->
    <script>
        // Date helpers for Monday/Sunday alignment
        function getMonday(d) {
            let date = new Date(d);
            let day = date.getDay();
            let diff = date.getDate() - day + (day === 0 ? -6 : 1);
            return new Date(date.setDate(diff));
        }

        function getSunday(d) {
            let date = new Date(d);
            let day = date.getDay();
            let diff = date.getDate() + (day === 0 ? 0 : 7 - day);
            return new Date(date.setDate(diff));
        }

        function projectApp() {
            return {
                darkMode: true, // Default to dark mode based on reference image
                tasks: [],
                milestones: [],
                teams: {

                    server: { name: 'Server', color: 'cyan', badgeColor: 'bg-cyan-400', borderClass: 'border-l-[4px] border-l-cyan-400 dark:border-t-slate-700 dark:border-r-slate-700 dark:border-b-slate-700', bgClass: 'bg-cyan-50/50 dark:bg-cyan-950/20' },
                    client: { name: 'Client', color: 'amber', badgeColor: 'bg-amber-400', borderClass: 'border-l-[4px] border-l-amber-400 dark:border-t-slate-700 dark:border-r-slate-700 dark:border-b-slate-700', bgClass: 'bg-amber-50/50 dark:bg-amber-950/20' },
                    probability: { name: '機率', color: 'pink', badgeColor: 'bg-pink-400', borderClass: 'border-l-[4px] border-l-pink-400 dark:border-t-slate-700 dark:border-r-slate-700 dark:border-b-slate-700', bgClass: 'bg-pink-50/50 dark:bg-pink-950/20' }
                },
                projectStart: new Date(),
                projectEnd: new Date(),
                
                // Filtering state
                searchQuery: '',
                filterTeam: 'all',
                filterStatus: 'all',

                // Modal state
                showTaskModal: false,
                modalTitle: '新增任務',
                currentTask: { id: null, name: '', team: 'director', assignee: '', startDate: '', endDate: '', progress: 0, status: 'Not Started', notes: '' },

                showMilestoneModal: false,
                currentMilestone: { id: null, name: '', date: '' },

                confirmModal: { show: false, title: '', message: '', onConfirm: () => {} },
                toast: { show: false, message: '', type: 'success' },

                // Initialize App
                initApp() {
                    if (localStorage.getItem('theme') === 'light') {
                        this.darkMode = false;
                    } else {
                        this.darkMode = true; // Force dark mode as default for this sleek layout
                    }

                    const storedTasks = localStorage.getItem('team3_grid_schedule_tasks');
                    const storedMilestones = localStorage.getItem('team3_grid_schedule_milestones');

                    if (storedTasks && storedMilestones) {
                        this.tasks = JSON.parse(storedTasks);
                        this.milestones = JSON.parse(storedMilestones);
                    } else {
                        this.loadDemoData();
                    }

                    this.updateProjectRange();
                    
                    this.$nextTick(() => { 
                        if (window.lucide) { lucide.createIcons(); }
                    });
                },

                // Custom Demo Data strictly based on the user's latest provided Excel
                loadDemoData() {
                    this.tasks = [
                        // W1 Director (2026-06-01 to 2026-06-05)
                        { id: 101, name: '新版【貂蟬秘曲】道具卡、營運需求', team: 'director', assignee: '企劃', startDate: '2026-06-01', endDate: '2026-06-05', progress: 50, status: 'In Progress', notes: '' },
                        { id: 102, name: '【孫悟空】2D 素材整理', team: 'director', assignee: '企劃', startDate: '2026-06-01', endDate: '2026-06-05', progress: 50, status: 'In Progress', notes: '' },

                        { id: 104, name: '4月份 AI 研究報告撰寫', team: 'director', assignee: '企劃', startDate: '2026-06-01', endDate: '2026-06-05', progress: 0, status: 'Not Started', notes: '' },
                        { id: 105, name: '完成【孫悟空】平台美術開單', team: 'director', assignee: '企劃', startDate: '2026-06-01', endDate: '2026-06-05', progress: 100, status: 'Completed', notes: '' },
                        { id: 106, name: '完成 剿滅董卓 上榜圖標開單', team: 'director', assignee: '企劃', startDate: '2026-06-01', endDate: '2026-06-05', progress: 100, status: 'Completed', notes: '' },
                        
                        // W2 Director (2026-06-08 to 2026-06-12)

                        { id: 108, name: '5月份 AI 研究報告撰寫', team: 'director', assignee: '企劃', startDate: '2026-06-08', endDate: '2026-06-12', progress: 0, status: 'Not Started', notes: '' },
                        { id: 109, name: '【貂蟬秘曲】顧問試玩 (6/12) 🚀', team: 'director', assignee: '企劃', startDate: '2026-06-12', endDate: '2026-06-12', progress: 100, status: 'Completed', notes: '' },

                        // Server W1
                        { id: 201, name: '【至尊王牌】不同 Bet 不同輪帶功能、壓測', team: 'server', assignee: '後端', startDate: '2026-06-01', endDate: '2026-06-05', progress: 60, status: 'In Progress', notes: '' },
                        { id: 202, name: '【貂蟬秘曲】C++ 開發 (免遊3調整)', team: 'server', assignee: '後端', startDate: '2026-06-01', endDate: '2026-06-05', progress: 80, status: 'In Progress', notes: '' },

                        { id: 303, name: '【貂蟬秘曲】完成 (6/5) 🚀', team: 'client', assignee: '前端', startDate: '2026-06-05', endDate: '2026-06-05', progress: 100, status: 'Completed', notes: '' },

                        { id: 304, name: '【孫悟空】MG 可Spin版本 (MG轉輪實作、Symbol串接)', team: 'client', assignee: '前端', startDate: '2026-06-08', endDate: '2026-06-12', progress: 30, status: 'In Progress', notes: '' },
                        { id: 305, name: '【孫悟空】FG 可Spin版本 (FG轉輪實作)', team: 'client', assignee: '前端', startDate: '2026-06-08', endDate: '2026-06-12', progress: 0, status: 'Not Started', notes: '' },
                        { id: 306, name: '【貂蟬秘曲】顧問試玩 (6/12) 🚀', team: 'client', assignee: '前端', startDate: '2026-06-12', endDate: '2026-06-12', progress: 100, status: 'Completed', notes: '' },

                        // Probability W1
                        { id: 401, name: '建立【至尊王牌】逐局數據統整工具', team: 'probability', assignee: '機率', startDate: '2026-06-01', endDate: '2026-06-05', progress: 50, status: 'In Progress', notes: '' },
                        { id: 402, name: '調整【至尊王牌】機率', team: 'probability', assignee: '機率', startDate: '2026-06-01', endDate: '2026-06-05', progress: 40, status: 'In Progress', notes: '' },
                        { id: 403, name: '【貂蟬秘曲】驗證快測工具、建立逐局統整工具', team: 'probability', assignee: '機率', startDate: '2026-06-01', endDate: '2026-06-05', progress: 100, status: 'Completed', notes: '' },
                        
                        // Probability W2
                        { id: 404, name: '【貂蟬秘曲】顧問版機率設定', team: 'probability', assignee: '機率', startDate: '2026-06-08', endDate: '2026-06-12', progress: 0, status: 'Not Started', notes: '' },
                        { id: 405, name: '調整【貂蟬秘曲】不同 Bet 不同輪帶', team: 'probability', assignee: '機率', startDate: '2026-06-08', endDate: '2026-06-12', progress: 0, status: 'Not Started', notes: '' },
                        { id: 406, name: '【貂蟬秘曲】顧問試玩 (6/12) 🚀', team: 'probability', assignee: '機率', startDate: '2026-06-12', endDate: '2026-06-12', progress: 100, status: 'Completed', notes: '' }
                    ];

                    this.milestones = [
                        { id: 1, name: '貂蟬秘曲 顧問試玩', date: '2026-06-12' },
                        { id: 2, name: '孫悟空 上線', date: '2026-07-29' }
                    ];
                },

                toggleDarkMode() {
                    this.darkMode = !this.darkMode;
                    localStorage.setItem('theme', this.darkMode ? 'dark' : 'light');
                },

                updateProjectRange() {
                    if (this.tasks.length === 0) {
                        this.projectStart = getMonday(new Date());
                        this.projectEnd = getSunday(new Date(this.projectStart.getTime() + 14 * 24 * 60 * 60 * 1000));
                        return;
                    }

                    let min = new Date(this.tasks[0].startDate);
                    let max = new Date(this.tasks[0].endDate);

                    this.tasks.forEach(t => {
                        let s = new Date(t.startDate);
                        let e = new Date(t.endDate);
                        if (s < min) min = s;
                        if (e > max) max = e;
                    });

                    // 確保涵蓋到最新的里程碑
                    this.milestones.forEach(m => {
                        let d = new Date(m.date);
                        if (d > max) max = d;
                    });

                    this.projectStart = getMonday(min);
                    this.projectEnd = getSunday(max);

                    // Min 2 weeks pad
                    let diffDays = Math.ceil((this.projectEnd - this.projectStart) / (24 * 60 * 60 * 1000));
                    if (diffDays < 14) {
                        this.projectEnd = new Date(this.projectStart.getTime() + 13 * 24 * 60 * 60 * 1000);
                    }
                },

                saveDataLocally() {
                    localStorage.setItem('team3_grid_schedule_tasks', JSON.stringify(this.tasks));
                    localStorage.setItem('team3_grid_schedule_milestones', JSON.stringify(this.milestones));
                    this.updateProjectRange();
                    this.$nextTick(() => { 
                        if(window.lucide) lucide.createIcons(); 
                    });
                },

                triggerConfirm(title, message, onConfirmCallback) {
                    this.confirmModal.title = title;
                    this.confirmModal.message = message;
                    this.confirmModal.onConfirm = onConfirmCallback;
                    this.confirmModal.show = true;
                    this.$nextTick(() => { 
                        if(window.lucide) lucide.createIcons(); 
                    });
                },

                confirmReset() {
                    this.triggerConfirm(
                        '還原預設範例', 
                        '確定要還原成「孫悟空 & 貂蟬」預設排程數據嗎？目前修改將會遺失。', 
                        () => {
                            this.loadDemoData();
                            this.saveDataLocally();
                            this.showToast('已恢復專案預設排程！', 'success');
                        }
                    );
                },

                // --- 新版 Grid Logic: 取得週數區間物件 ---
                getWeeks() {
                    let weeks = [];
                    let current = new Date(this.projectStart);
                    let weekNum = 1;
                    
                    // 以防萬一，只算到 projectEnd 當週的週日
                    let loopEnd = getSunday(this.projectEnd);

                    while (current <= loopEnd) {
                        let weekStart = new Date(current);
                        let weekEnd = new Date(current);
                        weekEnd.setDate(weekEnd.getDate() + 6); // Set to Sunday

                        // For display, maybe we show Mon-Fri dates if typical work week, but logical range is Mon-Sun
                        let startStr = `${(weekStart.getMonth()+1)}/${weekStart.getDate().toString().padStart(2,'0')}`;
                        let endStr = `${(weekEnd.getMonth()+1)}/${weekEnd.getDate().toString().padStart(2,'0')}`;
                        
                        weeks.push({
                            label: `W${weekNum}`,
                            dateStr: `${startStr} - ${endStr}`,
                            start: weekStart,
                            end: weekEnd
                        });
                        
                        current.setDate(current.getDate() + 7);
                        weekNum++;
                    }
                    return weeks;
                },

                // 核心邏輯：判斷任務是否落在該週區間內
                getTasksForGridCell(weekStart, weekEnd, teamId) {
                    return this.filteredTasks.filter(task => {
                        if (task.team !== teamId) return false;
                        
                        let tStart = new Date(task.startDate);
                        let tEnd = new Date(task.endDate);
                        
                        // Ignore time of day for precise overlapping comparison
                        tStart.setHours(0,0,0,0);
                        tEnd.setHours(23,59,59,999);
                        
                        // 任務開始時間早於或等於當週末，且任務結束時間晚於或等於當週一 (只要有交集就算)
                        return tStart <= weekEnd && tEnd >= weekStart;
                    });
                },

                get filteredTasks() {
                    return this.tasks.filter(task => {
                        const matchesSearch = task.name.toLowerCase().includes(this.searchQuery.toLowerCase()) || 
                                              task.assignee.toLowerCase().includes(this.searchQuery.toLowerCase());
                        const matchesTeam = this.filterTeam === 'all' || task.team === this.filterTeam;
                        const matchesStatus = this.filterStatus === 'all' || task.status === this.filterStatus;
                        return matchesSearch && matchesTeam && matchesStatus;
                    }).sort((a, b) => {
                        // Priority: 1. Not completed first, 2. Start date
                        if (a.status === 'Completed' && b.status !== 'Completed') return 1;
                        if (a.status !== 'Completed' && b.status === 'Completed') return -1;
                        return new Date(a.startDate) - new Date(b.startDate);
                    });
                },

                exportToExcel() {
                    try {
                        if (typeof XLSX === 'undefined') {
                            this.showToast('Excel 工具庫尚未載入完成，請稍後再試！', 'error');
                            return;
                        }
                        if (!this.tasks || !Array.isArray(this.tasks)) {
                            this.showToast('沒有可匯出的任務資料！', 'error');
                            return;
                        }

                        const tasksForExcel = this.tasks.map(t => ({
                            '任務ID': t.id,
                            '任務名稱': t.name || '',
                            '執行組別': this.teams[t.team]?.name || '未知',
                            '負責人': t.assignee || '',
                            '開始日期': t.startDate || '',
                            '結束日期': t.endDate || '',
                            '完成進度(%)': t.progress || 0,
                            '任務狀態': this.getStatusLabel(t.status),
                            '備註說明': t.notes || ''
                        }));

                        const milestonesForExcel = (this.milestones || []).map(m => ({
                            '里程碑名稱': m.name || '',
                            '達成日期': m.date || ''
                        }));

                        const wb = XLSX.utils.book_new();
                        const wsTasks = XLSX.utils.json_to_sheet(tasksForExcel);
                        
                        wsTasks['!cols'] = [
                            { wch: 10 }, { wch: 45 }, { wch: 15 }, { wch: 10 }, 
                            { wch: 15 }, { wch: 15 }, { wch: 12 }, { wch: 12 }, { wch: 30 }
                        ];
                        XLSX.utils.book_append_sheet(wb, wsTasks, '任務列表');

                        if (milestonesForExcel.length > 0) {
                            const wsMilestones = XLSX.utils.json_to_sheet(milestonesForExcel);
                            wsMilestones['!cols'] = [{ wch: 30 }, { wch: 15 }];
                            XLSX.utils.book_append_sheet(wb, wsMilestones, '里程碑');
                        }

                        const dateStr = new Date().toISOString().slice(0, 10).replace(/-/g, '');
                        XLSX.writeFile(wb, `三隊專案進度表_${dateStr}.xlsx`);
                        this.showToast('Excel 檔案匯出成功！', 'success');
                    } catch (err) {
                        console.error("Excel Export Error: ", err);
                        this.showToast('匯出 Excel 失敗！', 'error');
                    }
                },

                importFromExcel(event) {
                    const file = event.target.files[0];
                    if (!file || typeof XLSX === 'undefined') return;

                    const reader = new FileReader();
                    reader.onload = (e) => {
                        try {
                            const data = new Uint8Array(e.target.result);
                            const wb = XLSX.read(data, { type: 'array', cellDates: true });
                            
                            let importedTasks = [];
                            if (wb.SheetNames.includes('任務列表')) {
                                const wsTasks = wb.Sheets['任務列表'];
                                const rawTasks = XLSX.utils.sheet_to_json(wsTasks);
                                
                                importedTasks = rawTasks.map((row, index) => {
                                    const rawTeam = row['執行組別'] || '';
                                    const parsedTeam = this.mapChineseTeamToId(rawTeam);
                                    const rawStatus = row['任務狀態'] || '';
                                    const parsedStatus = this.mapChineseStatusToId(rawStatus);
                                    const progressVal = parseInt(row['完成進度(%)'] !== undefined ? row['完成進度(%)'] : 0);

                                    return {
                                        id: row['任務ID'] ? parseInt(row['任務ID']) : (Date.now() + index),
                                        name: row['任務名稱'] || '未命名任務',
                                        team: parsedTeam,
                                        assignee: row['負責人'] || '企劃',
                                        startDate: this.excelDateToString(row['開始日期']),
                                        endDate: this.excelDateToString(row['結束日期']),
                                        progress: isNaN(progressVal) ? 0 : Math.min(100, Math.max(0, progressVal)),
                                        status: parsedStatus,
                                        notes: row['備註說明'] || ''
                                    };
                                });
                            }

                            let importedMilestones = [];
                            const milestoneSheetName = wb.SheetNames.find(name => name === '里程碑' || name === '專案里程碑');
                            if (milestoneSheetName) {
                                const wsMilestones = wb.Sheets[milestoneSheetName];
                                const rawMilestones = XLSX.utils.sheet_to_json(wsMilestones);

                                importedMilestones = rawMilestones.map((row, index) => {
                                    return {
                                        id: row['里程碑ID'] ? parseInt(row['里程碑ID']) : (Date.now() + 1000 + index),
                                        name: row['里程碑名稱'] || '未命名里程碑',
                                        date: this.excelDateToString(row['達成日期'])
                                    };
                                });
                            }

                            if (importedTasks.length === 0 && importedMilestones.length === 0) {
                                this.showToast('匯入失敗：未在 Excel 檔案中找到任何有效數據！', 'error');
                                return;
                            }

                            if (importedTasks.length > 0) this.tasks = importedTasks;
                            if (importedMilestones.length > 0) this.milestones = importedMilestones;

                            this.saveDataLocally();
                            this.showToast('Excel 資料成功匯入並更新！', 'success');

                        } catch (err) {
                            console.error(err);
                            this.showToast('匯入失敗：不支援的試算表格式或檔案已損毀！', 'error');
                        }
                    };
                    reader.readAsArrayBuffer(file);
                    event.target.value = '';
                },

                excelDateToString(val) {
                    if (!val) return this.formatDateFull(new Date());
                    if (val instanceof Date) {
                        const tzOffset = val.getTimezoneOffset() * 60000; 
                        const adjustedDate = new Date(val.getTime() - tzOffset);
                        return adjustedDate.toISOString().split('T')[0];
                    }
                    if (typeof val === 'number') {
                        const date = new Date((val - 25569) * 86400 * 1000);
                        return date.toISOString().split('T')[0];
                    }
                    if (typeof val === 'string') {
                        const d = new Date(val.trim());
                        if (!isNaN(d.getTime())) return d.toISOString().split('T')[0];
                        return val.trim();
                    }
                    return this.formatDateFull(new Date());
                },

                mapChineseTeamToId(val) {
                    const s = val.toString().toLowerCase().trim();
                    if (s.includes('server') || s.includes('後端')) return 'server';
                    if (s.includes('client') || s.includes('前端')) return 'client';
                    if (s.includes('probability') || s.includes('機率')) return 'probability';
                    return 'director'; // default
                },

                mapChineseStatusToId(val) {
                    const s = val.toString().toLowerCase().trim();
                    if (s.includes('進行') || s.includes('progress')) return 'In Progress';
                    if (s.includes('完成') || s.includes('completed')) return 'Completed';
                    if (s.includes('延誤') || s.includes('delayed')) return 'Delayed';
                    return 'Not Started';
                },

                showToast(msg, type = 'success') {
                    this.toast.message = msg;
                    this.toast.type = type;
                    this.toast.show = true;
                    setTimeout(() => { this.toast.show = false; }, 3000);
                },

                // UI Helpers
                formatDateShort(d) {
                    const date = new Date(d);
                    return `${date.getFullYear()}/${(date.getMonth() + 1).toString().padStart(2,'0')}/${date.getDate().toString().padStart(2,'0')}`;
                },

                formatDateFull(d) {
                    const date = new Date(d);
                    return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
                },

                getStatusBadgeClass(status) {
                    const classes = {
                        'Not Started': 'bg-slate-100 text-slate-700 dark:bg-slate-800 dark:text-slate-300',
                        'In Progress': 'bg-blue-100 text-blue-700 dark:bg-blue-900/40 dark:text-blue-300',
                        'Completed': 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/40 dark:text-emerald-300',
                        'Delayed': 'bg-rose-100 text-rose-700 dark:bg-rose-900/40 dark:text-rose-300'
                    };
                    return classes[status] || classes['Not Started'];
                },

                getStatusLabel(status) {
                    const labels = {
                        'Not Started': '未開始',
                        'In Progress': '進行中',
                        'Completed': '已完成',
                        'Delayed': '已延誤'
                    };
                    return labels[status] || '未開始';
                },

                openTaskModal(task = null) {
                    if (task) {
                        this.currentTask = JSON.parse(JSON.stringify(task));
                        this.modalTitle = '編輯排程任務';
                    } else {
                        const today = new Date();
                        const nextWeek = new Date(today.getTime() + 4 * 24 * 60 * 60 * 1000); // Default to a 5-day task
                        this.currentTask = {
                            id: null,
                            name: '',
                            team: this.filterTeam !== 'all' ? this.filterTeam : 'director',
                            assignee: '',
                            startDate: this.formatDateFull(today),
                            endDate: this.formatDateFull(nextWeek),
                            progress: 0,
                            status: 'Not Started',
                            notes: ''
                        };
                        this.modalTitle = '新增排程任務';
                    }
                    this.showTaskModal = true;
                },

                saveTask() {
                    const start = new Date(this.currentTask.startDate);
                    const end = new Date(this.currentTask.endDate);
                    
                    if (start > end) {
                        this.showToast('錯誤：開始日期不能晚於結束日期！', 'error');
                        return;
                    }

                    if (parseInt(this.currentTask.progress) === 100) this.currentTask.status = 'Completed';
                    else if (parseInt(this.currentTask.progress) > 0 && this.currentTask.status === 'Not Started') this.currentTask.status = 'In Progress';
                    else if (parseInt(this.currentTask.progress) === 0 && this.currentTask.status === 'Completed') this.currentTask.progress = 100;

                    if (this.currentTask.id) {
                        const index = this.tasks.findIndex(t => t.id === this.currentTask.id);
                        if (index !== -1) this.tasks[index] = JSON.parse(JSON.stringify(this.currentTask));
                        this.showToast('排程修改成功！', 'success');
                    } else {
                        this.currentTask.id = Date.now();
                        this.tasks.push(JSON.parse(JSON.stringify(this.currentTask)));
                        this.showToast('排程任務建立成功！', 'success');
                    }

                    this.showTaskModal = false;
                    this.saveDataLocally();
                },

                confirmDeleteTask(id) {
                    this.triggerConfirm('刪除排程任務', `確定要刪除此任務嗎？動作不可逆。`, () => {
                        this.tasks = this.tasks.filter(t => t.id !== id);
                        this.showTaskModal = false;
                        this.saveDataLocally();
                        this.showToast('任務已成功刪除！', 'success');
                    });
                },

                openMilestoneModal() {
                    this.currentMilestone = { id: null, name: '', date: this.formatDateFull(new Date()) };
                    this.showMilestoneModal = true;
                },

                saveMilestone() {
                    this.currentMilestone.id = Date.now();
                    this.milestones.push(JSON.parse(JSON.stringify(this.currentMilestone)));
                    this.showMilestoneModal = false;
                    this.saveDataLocally();
                    this.showToast('新增專案里程碑成功！', 'success');
                },

                confirmDeleteMilestone(id) {
                    this.triggerConfirm('刪除里程碑', `確定要刪除此里程碑嗎？`, () => {
                        this.milestones = this.milestones.filter(m => m.id !== id);
                        this.saveDataLocally();
                        this.showToast('里程碑已刪除！', 'success');
                    });
                },

                // Stats
                calculateTotalProgress() {
                    if (this.tasks.length === 0) return 0;
                    return Math.round(this.tasks.reduce((a, t) => a + parseInt(t.progress), 0) / this.tasks.length);
                },
                getTasksCountForTeam(teamId) {
                    return this.tasks.filter(t => t.team === teamId).length;
                },
                getRemainingDays() {
                    const today = new Date();
                    const end = new Date(this.projectEnd);
                    if (today > end) return 0;
                    return Math.ceil((end - today) / (1000 * 60 * 60 * 24));
                }
            }
        }
    </script>
    
    <style>
        [x-cloak] { display: none !important; }
        
        /* 讓 Grid 中的完成項目擁有灰階半透明與刪除線視覺效果 */
        .task-completed {
            opacity: 0.6;
            transition: all 0.2s;
        }
        .task-completed h4 {
            text-decoration: line-through;
            color: #64748b !important; /* text-slate-500 */
        }
        .task-completed:hover {
            opacity: 0.9;
        }
    </style>
</head>

                            <div class="space-y-1">
                                <label class="block text-[10px] md:text-xs font-bold text-slate-400 uppercase">排程迄日</label>
                                <input type="date" x-model="currentTask.endDate" required class="w-full border border-slate-200 dark:border-slate-700 bg-white dark:bg-[#151e2e] rounded-xl px-2 md:px-4 py-2 md:py-2.5 text-xs md:text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                            </div>
                        </div>

                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 md:gap-4">
                            <div class="space-y-1">
                                <label class="block text-[10px] md:text-xs font-bold text-slate-400 uppercase flex justify-between">
                                    <span>完成進度</span>
                                    <span class="text-indigo-600 dark:text-indigo-400" x-text="currentTask.progress + '%'"></span>
                                </label>
                                <div class="flex items-center h-[38px] md:h-[42px] px-1">
                                     <input type="range" min="0" max="100" step="10" x-model="currentTask.progress" class="w-full h-2 bg-slate-200 dark:bg-slate-700 rounded-lg appearance-none cursor-pointer accent-indigo-600">
                                </div>
                            </div>
                            <div class="space-y-1">
                                <label class="block text-[10px] md:text-xs font-bold text-slate-400 uppercase">任務狀態</label>
                                <select x-model="currentTask.status" class="w-full border border-slate-200 dark:border-slate-700 bg-white dark:bg-[#151e2e] rounded-xl px-2 md:px-3 py-2 md:py-2.5 text-xs md:text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                                    <option value="Not Started">未開始</option>
                                    <option value="In Progress">進行中</option>
                                    <option value="Completed">已完成</option>
                                    <option value="Delayed">已延誤</option>
                                </select>
                            </div>
                        </div>

                        <div class="flex items-center justify-end space-x-2 pt-3 md:pt-4 border-t border-slate-200 dark:border-slate-800 mt-2">
                            <button type="button" @click="showTaskModal = false" class="px-4 py-2 border border-slate-200 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-300 text-xs md:text-sm font-semibold rounded-xl transition">取消</button>
                            <button type="submit" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white text-xs md:text-sm font-semibold rounded-xl transition shadow-md">儲存任務</button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Milestone Add Modal -->
            <div x-show="showMilestoneModal" class="fixed inset-0 bg-slate-950/60 backdrop-blur-sm flex items-center justify-center z-50 p-4" x-cloak x-transition.opacity>
                <div @click.away="showMilestoneModal = false" class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 w-full max-w-sm rounded-2xl shadow-xl overflow-hidden transform transition-all" x-transition:enter="ease-out duration-300" x-transition:enter-start="opacity-0 scale-95" x-transition:enter-end="opacity-100 scale-100">
                    <div class="px-4 py-3 md:px-5 border-b border-slate-200 dark:border-slate-800 flex justify-between items-center bg-slate-50 dark:bg-slate-850">
                        <h3 class="font-bold text-sm md:text-md">設定專案里程碑</h3>
                        <button type="button" @click="showMilestoneModal = false" class="p-1 text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-700 rounded-lg">
                            <i data-lucide="x" class="w-4 h-4"></i>
                        </button>
                    </div>
                    
                    <!-- Milestone List (for quick deletion inside modal) -->
                    <div class="max-h-40 overflow-y-auto bg-slate-50 dark:bg-[#0f172a] border-b border-slate-200 dark:border-slate-800">
                        <template x-for="m in milestones" :key="m.id">
                            <div class="flex justify-between items-center px-5 py-2 border-b border-slate-200 dark:border-slate-800 last:border-0">
                                <div>
                                    <span class="text-xs font-bold text-slate-700 dark:text-slate-300" x-text="m.name"></span>
                                    <span class="text-[10px] text-slate-500 ml-2" x-text="m.date"></span>
                                </div>
                                <button type="button" @click="confirmDeleteMilestone(m.id)" class="text-slate-400 hover:text-rose-500 transition">
                                    <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                                </button>
                            </div>
                        </template>
                        <template x-if="milestones.length === 0">
                            <div class="px-5 py-4 text-center text-xs text-slate-500 dark:text-slate-400">目前沒有里程碑</div>
                        </template>
                    </div>

                    <form @submit.prevent="saveMilestone()" class="p-4 md:p-5 space-y-3 md:space-y-4">
                        <div class="space-y-1">
                            <label class="block text-[10px] md:text-xs font-bold text-slate-400 uppercase">新增里程碑名稱</label>
                            <input type="text" x-model="currentMilestone.name" required placeholder="例如：孫悟空 上線" class="w-full border border-slate-200 dark:border-slate-700 bg-white dark:bg-[#151e2e] rounded-xl px-3 py-2 text-xs md:text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        </div>
                        <div class="space-y-1">
                            <label class="block text-[10px] md:text-xs font-bold text-slate-400 uppercase">達成日期</label>
                            <input type="date" x-model="currentMilestone.date" required class="w-full border border-slate-200 dark:border-slate-700 bg-white dark:bg-[#151e2e] rounded-xl px-3 py-2 text-xs md:text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        </div>
                        <div class="flex justify-end space-x-2 pt-3 border-t border-slate-200 dark:border-slate-800">
                            <button type="submit" class="w-full px-3 md:px-4 py-1.5 md:py-2 bg-emerald-600 hover:bg-emerald-700 text-white text-[10px] md:text-xs font-bold rounded-lg transition shadow-md">新增里程碑</button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Custom Confirmation Modal -->
            <div x-show="confirmModal.show" class="fixed inset-0 bg-slate-950/75 backdrop-blur-sm flex items-center justify-center z-[60] p-4" x-cloak x-transition.opacity>
                <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 w-full max-w-sm md:max-w-md rounded-2xl shadow-2xl overflow-hidden transform transition-all" x-transition:enter="ease-out duration-300" x-transition:enter-start="opacity-0 scale-95 translate-y-4" x-transition:enter-end="opacity-100 scale-100 translate-y-0">
                    <div class="p-5 md:p-6 text-center space-y-3 md:space-y-4">
                        <div class="mx-auto w-10 h-10 md:w-12 md:h-12 bg-rose-50 dark:bg-rose-950/30 text-rose-600 dark:text-rose-400 rounded-full flex items-center justify-center">
                            <i data-lucide="alert-circle" class="w-5 h-5 md:w-6 md:h-6"></i>
                        </div>
                        <div class="space-y-1.5 md:space-y-2">
                            <h3 class="font-bold text-base md:text-lg text-slate-900 dark:text-white" x-text="confirmModal.title">確認操作</h3>
                            <p class="text-xs md:text-sm text-slate-500 dark:text-slate-400 leading-relaxed" x-text="confirmModal.message"></p>
                        </div>
                        <div class="flex items-center justify-center space-x-2 md:space-x-3 pt-3 md:pt-4">
                            <button type="button" @click="confirmModal.show = false" class="px-4 md:px-5 py-1.5 md:py-2 bg-slate-100 hover:bg-slate-200 dark:bg-slate-800 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 text-[10px] md:text-xs font-bold rounded-xl transition">取消</button>
                            <button type="button" @click="confirmModal.onConfirm(); confirmModal.show = false;" class="px-4 md:px-5 py-1.5 md:py-2 bg-rose-600 hover:bg-rose-700 text-white text-[10px] md:text-xs font-bold rounded-xl transition shadow-md">確認執行</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Toast Alert Notification -->
            <div class="fixed bottom-4 right-4 md:bottom-5 md:right-5 z-[70] transform transition-all duration-300" x-show="toast.show" x-cloak x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 translate-y-4" x-transition:enter-end="opacity-100 translate-y-0" x-transition:leave="transition ease-in duration-200" x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0">
                <div class="px-3 md:px-4 py-2.5 md:py-3 rounded-xl shadow-lg border text-white font-semibold text-xs md:text-sm flex items-center space-x-2"
                     :class="toast.type === 'success' ? 'bg-emerald-600 border-emerald-500' : 'bg-rose-600 border-rose-500'">
                    <i :data-lucide="toast.type === 'success' ? 'check-circle' : 'alert-circle'" class="w-3.5 h-3.5 md:w-4 md:h-4"></i>
                    <span x-text="toast.message"></span>
                </div>
            </div>

        </div>
    </div>
    
    <!-- AlpineJS Initialization -->
    <script>
        document.addEventListener('alpine:initialized', () => {
             if(window.lucide) { lucide.createIcons(); }
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

</body>
</html>
