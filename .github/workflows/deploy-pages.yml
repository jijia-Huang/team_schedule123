name: Deploy custom HTML to GitHub Pages

on:
  workflow_dispatch:
    inputs:
      html_content:
        description: "Paste custom HTML. Leave empty to deploy source_file."
        required: false
        type: string
      source_file:
        description: "HTML file to deploy when html_content is empty."
        required: true
        default: "2隊/group2.html"
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Pages artifact
        env:
          CUSTOM_HTML: ${{ inputs.html_content }}
          SOURCE_FILE: ${{ inputs.source_file }}
        run: |
          python <<'PY'
          import os
          import shutil
          from pathlib import Path

          root = Path.cwd()
          dist = root / "dist"
          if dist.exists():
              shutil.rmtree(dist)
          dist.mkdir()

          excluded = {".git", ".github", "dist"}
          for item in root.iterdir():
              if item.name in excluded:
                  continue

              target = dist / item.name
              if item.is_dir():
                  shutil.copytree(item, target)
              else:
                  shutil.copy2(item, target)

          html = os.environ.get("CUSTOM_HTML", "")
          if html.strip():
              (dist / "index.html").write_text(html, encoding="utf-8")
          else:
              source = (root / os.environ["SOURCE_FILE"]).resolve()
              source.relative_to(root)
              if not source.is_file():
                  raise FileNotFoundError(f"HTML source file not found: {source}")
              shutil.copy2(source, dist / "index.html")

          (dist / ".nojekyll").touch()
          PY

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
